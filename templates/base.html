<!DOCTYPE html>
<html>
<head>
    <title>Genshin App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4" style="position: relative; z-index: 1100;">
    <a class="navbar-brand d-flex align-items-center" href="/">
        <img src="https://www.freepnglogos.com/uploads/genshin-impact-logo-png/genshin-impact-shadow-logo-by-kurikuo-steamgriddb-4.png" 
             style="height:30px; margin-right:10px;">
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
        aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarContent">
        <ul class="navbar-nav me-auto">
            <li class="nav-item">
                <a class="nav-link" href="/">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/users">User</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/dashboard">Character</a>
            </li>
        </ul>

        <ul class="navbar-nav ms-auto">
            {% if current_user.is_authenticated %}
                <li class="nav-item">
                    <a class="nav-link" href="/logout">Logout</a>
                </li>
            {% else %}
                <li class="nav-item">
                    <a class="nav-link" href="/login">Account</a>
                </li>
            {% endif %}
        </ul>
    </div>
</nav>


<div>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
        <div id="flash-msg" class="alert alert-warning text-center" role="alert"
             style="position: fixed; 
                    top: 50%; left: 50%; 
                    transform: translate(-50%, -50%);
                    font-size: 1.5rem; z-index: 1200;">
            {{ messages[0] }}
        </div>
        <script>
        setTimeout(() => {
            document.getElementById('flash-msg').style.display = 'none';
        }, 3000); 
        </script>
    {% endif %}
    {% endwith %}
</div>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
