{% extends "base.html" %}
{% block content %}


<div style="position: fixed; top:45%; left:50%; transform: translate(-50%, -50%); z-index:1; text-align:center;">
    <img src="https://www.freepnglogos.com/uploads/genshin-impact-logo-png/genshin-impact-shadow-logo-by-kurikuo-steamgriddb-4.png" 
         style="max-width:700px; margin-bottom: 2rem;">
       
    <h1 style="color:white; -webkit-text-stroke: 1px #adcaf1; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">
        Welcome to Genshin Impact
    </h1>
    <h4 style="color:white; -webkit-text-stroke: 0.5px #adcaf1; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-top:1rem;">
        Manage your characters and profile easily
    </h4>

    <br>
    {% if not current_user.is_authenticated %}
    <a href="/login" class="btn btn-primary mt-3">Go to Login</a>
    {% endif %}
</div>


<video id="bgVideo" autoplay muted loop playsinline
       style="position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-2;">
    <source src="{{ url_for('static', filename='video/bg.mp4') }}" type="video/mp4">
</video>

<script>
    const video = document.getElementById("bgVideo");

    video.addEventListener("loadedmetadata", () => {
        let savedTime = localStorage.getItem("videoTime");
        if (savedTime) {
            video.currentTime = parseFloat(savedTime);
        }
    });

    video.addEventListener("timeupdate", () => {
        localStorage.setItem("videoTime", video.currentTime);
    });
</script>

{% endblock %}
