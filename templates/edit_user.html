{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-center align-items-center" style="height:85vh;">

<video id="bgVideo" autoplay muted loop playsinline
       style="position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-2;">
    <source src="{{ url_for('static', filename='video/V1.mp4') }}" type="video/mp4">
</video>

    <div class="card p-4 shadow" style="width:400px;">

        <h3 class="text-center mb-3">Edit User</h3>

        <form method="POST">
            
            <label class="form-label">Username</label>
            <input name="username" class="form-control mb-3" 
                   value="{{ user.username }}" required>

            <label class="form-label">Password</label>
            <div class="input-group mb-3">
                <input id="passwordField" name="password" type="password" class="form-control" 
                       value="{{ user.password }}" required>
                <span class="input-group-text" id="togglePassword" style="cursor: pointer;">
                    <i class="bi bi-eye"></i>
                </span>
            </div>

            <label class="form-label">UID</label>
            <input name="uid" class="form-control mb-3" 
                   value="{{ user.uid }}" required>

            <label class="form-label">Server</label>
            <select name="server" class="form-control mb-3">
                <option value="ASIA" {% if user.server=='ASIA' %}selected{% endif %}>ASIA</option>
                <option value="EU" {% if user.server=='EU' %}selected{% endif %}>EU</option>
                <option value="NA" {% if user.server=='NA' %}selected{% endif %}>NA</option>
            </select>

            <button class="btn btn-primary w-100">Update</button>
        </form>

        <a href="/users" class="btn btn-secondary w-100 mt-2">Back</a>
        <a href="/delete_user/{{ user.id }}" class="btn btn-danger w-100 mt-2"
           onclick="return confirm('Are you sure you want to delete this user?');">Delete</a>

    </div>

</div>

<script>
const togglePassword = document.getElementById('togglePassword');
const passwordField = document.getElementById('passwordField');

togglePassword.addEventListener('click', function () {
    const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordField.setAttribute('type', type);
    this.querySelector('i').classList.toggle('bi-eye');
    this.querySelector('i').classList.toggle('bi-eye-slash');
});
</script>

<script>
    const video = document.getElementById("bgVideo");

    video.addEventListener("loadedmetadata", () => {
        let savedTime = localStorage.getItem("videoTime");
        if (savedTime) {
            video.currentTime = parseFloat(savedTime);
        }
    });

    video.addEventListener("timeupdate", () => {
        localStorage.setItem("videoTime", video.currentTime);
    });
</script>

{% endblock %}
