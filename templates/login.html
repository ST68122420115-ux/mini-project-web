{% extends "base.html" %}
{% block content %}

<style>
body { margin: 0; overflow: hidden; }

.card-custom {
    width: 90%;
    max-width: 450px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.2);
    z-index: 101; /* ต่ำกว่า navbar */
}

.logo { width: 70%; max-width: 300px; }

.overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 100; /* ต่ำกว่า navbar */
}

.center-container {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex; justify-content: center; align-items: center;
    padding: 10px;
    z-index: 101; /* ต่ำกว่า navbar */
}
</style>

<video id="bgVideo" autoplay muted loop playsinline
       style="position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-2;">
    <source src="{{ url_for('static', filename='video/bg.mp4') }}" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="center-container">
    <div class="card p-4 shadow card-custom">
        <div class="text-center mb-3">
            <img src="https://www.freepnglogos.com/uploads/genshin-impact-logo-png/genshin-impact-shadow-logo-by-kurikuo-steamgriddb-4.png" 
                 class="logo">
        </div>
        <br>

        {% if error %}
            <div id="errorAlert" class="alert alert-danger text-center">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            <input name="username" class="form-control mb-3" placeholder="Username" required>

            
            <div class="input-group mb-3">
                <input id="password" name="password" type="password" class="form-control" placeholder="Password" required>
                <span class="input-group-text" id="togglePassword" style="cursor: pointer;">
                    <i class="bi bi-eye"></i>
                </span>
            </div>

            <button class="btn btn-primary w-100">Login</button>
        </form>

        <p class="mt-3 text-center text-white">
            Don't have an account? 
            <a href="/register" style="color:#00d4ff;">Register</a>
        </p>
    </div>
</div>

<script>
const video = document.getElementById("bgVideo");
video.addEventListener("loadedmetadata", () => {
    let savedTime = localStorage.getItem("videoTime");
    if (savedTime) video.currentTime = parseFloat(savedTime);
});
video.addEventListener("timeupdate", () => {
    localStorage.setItem("videoTime", video.currentTime);
});


const togglePassword = document.getElementById('togglePassword');
const password = document.getElementById('password');

togglePassword.addEventListener('click', function () {
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);
    this.querySelector('i').classList.toggle('bi-eye');
    this.querySelector('i').classList.toggle('bi-eye-slash');
});
</script>

{% endblock %}
